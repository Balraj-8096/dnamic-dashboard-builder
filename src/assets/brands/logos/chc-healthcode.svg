<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 32" fill="none">
  <!-- HealthCode CHC — shield mark with cross + HC monogram + wordmark -->

  <!-- Shield background -->
  <path d="M4 6 L16 2 L28 6 L28 18 Q28 26 16 30 Q4 26 4 18 Z" fill="#2c2569" opacity="0.15"/>

  <!-- Cross inside shield -->
  <rect x="13" y="8"  width="6" height="16" rx="2" fill="#2c2569"/>
  <rect x="8"  y="13" width="16" height="6"  rx="2" fill="#2c2569"/>

  <!-- Cyan accent dot — top right of shield -->
  <circle cx="25" cy="5" r="3.5" fill="#7ADBEE"/>

  <!-- Wordmark -->
  <text x="36" y="22" font-family="Manrope, sans-serif" font-size="15" font-weight="700" fill="#2c2569" letter-spacing="0.3">Health</text>
  <text x="94" y="22" font-family="Manrope, sans-serif" font-size="15" font-weight="800" fill="#7ADBEE" letter-spacing="0.3">Code</text>
  <text x="138" y="22" font-family="Manrope, sans-serif" font-size="13" font-weight="500" fill="#a6a6a6" letter-spacing="0.5"> CHC</text>
</svg>
